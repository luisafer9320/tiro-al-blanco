<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Carnival Ducks | Tiro al Blanco</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/game.css" />
</head>

<body>

    <div class="dashboard-container">
        <header class="app-header">
            <div class="weather-info">
                <i class="fas fa-cloud-rain" aria-hidden="true"></i>
                <div class="weather-details">
                    <span>24°C Sunny</span>
                </div>
            </div>

            <h1 class="app-title">🎯Tiro al Blanco</h1>


            <div class="location-top">
                <i class="fas fa-map-marker-alt" aria-hidden="true"></i>
                <span>MADRID, ES</span>
            </div>
        </header>

        <main class="game-area">
            <div class="toldo" aria-hidden="true">
                <div class="rayas"></div>
            </div>

            <div class="game-controls">
                <div class="control-item">
                    SCORE: <span class="value" id="score">240</span>
                </div>
                <button class="btn-reset" id="btnReset">REINICIAR</button>
                <div class="control-item">
                    TIME: <span class="value time-value" id="timer">00:45</span>
                </div>
            </div>

            <div class="play-button-container">
                <button class="play-main-btn" id="btnPlay" aria-label="Jugar">
                    <span>PLAY</span>
                </button>
            </div>

            <div id="gameCanvas"></div>
        </main>

        <section class="info-section">
            <div class="info-grid">
                <article class="card">

                    <div class="container">
                        <h4>UBICACION - CLIMA</h4>
                        <input type="text" id="ciudad" placeholder="Escribe una ciudad...">
                        <button id="buscar">Consultar</button>

                        <div id="resultado">
                            <h2 id="nombre-ciudad"></h2>
                            <p id="temp"></p>
                            <p id="desc"></p>
                        </div>
                    </div>




                    <button onclick="obtenerUbicacionActual()"></button>

                    <!--<span class="card-label">LOCATION</span>
                    <h3>Madrid</h3>
                    <span class="card-sub-info">Spain District</span>-->
                </article>

                <article class="card">
                    <span class="card-label">DAILY WINNER</span>
                    <h3>@DuckKing99</h3>
                    <span class="card-sub-info">1,240 Hits</span>
                </article>
            </div>
        </section>

        <footer>
            <nav class="footer-nav">
                <button type="button" aria-label="Inicio"><i class="fas fa-home"></i><br>INICIO</button>
                <button type="button" aria-label="Idiomas"><i class="fas fa-globe"></i><br>IDIOMAS</button>
                <button type="button" aria-label="Juegos"><i class="fas fa-gamepad"></i><br>JUEGOS</button>
                <button type="button" aria-label="Perfil"><i class="fas fa-user"></i><br>PERFIL</button>
            </nav>
            <div class="Navfooter">
                <div class="legal-links">
                    <a href="#">Condiciones de uso</a>
                    <a href="#">Política de privacidad</a>
                    <a href="#">Contacto</a>
                </div>
                <p>&copy; 2026 Tiro al Blanco • <strong>FemCoders</strong></p>
            </div>
        </footer>
    </div>

    <script src="js/main.js" type="module"></script>
    <script src="helpers/utils.js"></script>
    <script src="features/data/levels.js"></script>
    <script src="features/components/target.js"></script>
    <script src="features/core/storage.js"></script>
    <script src="features/core/game.js"></script>
    <script src="views.js"></script>
    <script src="main.js"></script>
    <script src="apiconnection.js"></script>
</body>

</html>
