<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Carnival Ducks | Tiro al Blanco</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/game.css" />
    <link rel="icon" href="assets/logo.png"/>
</head>
<body>
         <!-- Barra de navegación del juego -->
        <nav class="game-nav">
            <a href="#" class="nav-logo">
                <img src="assets/logo.png" alt="Logo" />
            </a>
            <a href="https://adriasu09.github.io/landing-Carnival/#games" class="nav-item" target="_blank">
                <i class="fas fa-home"></i><span>Home</span>
            </a>
            <a href="#" class="nav-item active">
                <i class="fas fa-crosshairs"></i><span>Jugar</span>
            </a>
            <a href="#" class="nav-item">
                <i class="fas fa-trophy"></i><span>Ranking</span>
            </a>
            <a href="#" class="nav-item">
                <i class="fas fa-cog"></i><span>Ajustes</span>
            </a>
        </nav>

        <main class="game-area">
            <div class="toldo"><div class="rayas"></div></div>
            
            <div class="game-content">
                
                <div id="startScreen" class="screen active">
                    <div class="level-select">
                        <h2>ELIGE TU NIVEL</h2>
                        <div class="level-buttons">
                            <button class="level-btn level-1" data-level="1">
                                <span class="level-number">1</span>
                                <span class="level-name">Principiante</span>
                            </button>
                            <button class="level-btn level-2" data-level="2">
                                <span class="level-number">2</span>
                                <span class="level-name">Intermedio</span>
                            </button>
                            <button class="level-btn level-3" data-level="3">
                                <span class="level-number">3</span>
                                <span class="level-name">Experto</span>
                            </button>
                        </div>
                        <button class="play-btn" id="startBtn" disabled>JUGAR</button>
                    </div>
                </div>

                <div id="gameScreen" class="screen">
                    <div class="game-controls">
                        <div class="control-item">PUNTOS: <span class="value" id="score">0</span></div>
                        <div class="control-item">TIEMPO: <span class="value time-value" id="time">45</span></div>
                    </div>
<div id="gameCanvas">
    <button class="pause-floating" id="pauseBtn">
        <span class="icon">⏸️</span>
        <span class="text">PAUSA</span>
    </button>
</div>

                <div id="pauseScreen" class="screen">
                    <h2>JUEGO PAUSADO</h2>
                    <button id="resumeBtn">REANUDAR</button>
                    <button id="exitPauseBtn">SALIR</button>
                </div>

                <div id="gameOverScreen" class="screen">
                    <h2>GAME OVER</h2>
                    <p>Puntos: <span id="finalScore">0</span></p>
                    <p>Aciertos: <span id="finalHits">0</span></p>
                    <p>Precisión: <span id="finalPrecision">0%</span></p>
                    <button id="restartBtn">JUGAR DE NUEVO</button>
                </div>

            </div>
        </main>

        <section class="info-section">
            <div class="info-grid">
                <article class="card">
                    <span class="card-label">LOCATION</span>
                    <h3>Madrid</h3>
                    <span class="card-sub-info">Spain District</span>
                </article>
                
                <article class="card">
                    <span class="card-label">DAILY WINNER</span>
                    <h3>@DuckKing99</h3>
                    <span class="card-sub-info">1,240 Hits</span>
                </article>

                <article class="card" id="news-section">
                    <span class="card-label">TITULARES</span>
                    <div id="news-container">
                    </div>
                </article>
            </div>
        </section>

        <footer>
            <nav class="footer-nav">
                <button type="button" aria-label="Inicio"><i class="fas fa-home"></i><br>INICIO</button>
                <button type="button" aria-label="Idiomas"><i class="fas fa-globe"></i><br>IDIOMAS</button>
                <button type="button" aria-label="Juegos"><i class="fas fa-gamepad"></i><br>JUEGOS</button>
                <button type="button" aria-label="Perfil"><i class="fas fa-user"></i><br>PERFIL</button>
            </nav>
            <div class="nav-footer">
                <div class="legal-links">
                    <a href="#">Condiciones de uso</a>
                    <a href="#">Política de privacidad</a>
                    <a href="#">Contacto</a>
                </div>
                <p>&copy; 2026 Tiro al Blanco • <strong>FemCoders</strong></p>
            </div>
        </footer>
    </div>

<script src="main.js" type="module"></script>
</body>
</html>
